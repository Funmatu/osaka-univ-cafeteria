name: Update Menu Data

on:
  schedule:
    # UTC 01:47 = JST 10:47 schedule (食堂開店 11:00 直前を狙う)。
    # 食堂サーバー側のメニュー更新は JST 10:45 までに完了する想定 (@handai_fs の
    # Twitter 投稿時刻より推定)。top-of-hour (:00) は GitHub Actions schedule
    # event が世界的に混雑して数時間遅延する既知挙動があるため、off-minute (:47)
    # で混雑回避しつつ食堂開店前ギリギリを狙う。
    - cron: '47 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-menu
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run scraper
        run: node scripts/scrape.mjs
        env:
          TZ: Asia/Tokyo

      - name: Commit updated data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(data): refresh menu $(TZ=Asia/Tokyo date +%Y-%m-%d)"
            git push
          fi

      - name: Upload debug artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-debug
          path: |
            debug-*.png
            public/data/**/*.json
            public/data/index.json
          if-no-files-found: ignore
          retention-days: 7
